<script>
// ── Config ───────────────────────────────────────────────────────────────────
// Webhook target: CrescaOS Website Backend (Railway)
// Do NOT point this to the OpenClaw runtime (openclaw-production-977e)
const WEBHOOK_URL = 'https://openclaw-production-0664.up.railway.app/api/webhook';

// Language: set via LANG constant ('en' | 'es')
const LANG = 'en';

const urlParams = new URLSearchParams(window.location.search);
const state = {
  firstName:'', email:'', phone:'',
  businessType:'', businessName:'',
  revenueStage:'', bottleneck:'', responseTime:'',
  score:0, monthlyLoss:0, tier:'', bottleneckLabel:'',
  language: LANG,
  utm_source: urlParams.get('utm_source') || '',
  utm_medium: urlParams.get('utm_medium') || '',
  utm_campaign: urlParams.get('utm_campaign') || '',
  utm_content: urlParams.get('utm_content') || '',
  utm_term: urlParams.get('utm_term') || '',
  source_page: window.location.href,
  referrer: document.referrer || '',
  landing_page: sessionStorage.getItem('landing_page') || window.location.href
};

const TOTAL_STEPS = 10;

// ── Copy ────────────────────────────────────────────────────────────────────
const COPY = {
  bizTypes:[
    {v:'home_services',    e:'🏠', h:'Home Services',        s:'Cleaning, HVAC, plumbing, landscaping, pest control'},
    {v:'health_wellness',  e:'🏥', h:'Health & Wellness',    s:'Med spa, chiro, dental, therapy, gym'},
    {v:'professional',     e:'🏢', h:'Professional Services', s:'Law, accounting, consulting, coaching'},
    {v:'trades',           e:'🔧', h:'Trades & Contracting',  s:'Roofing, electrical, remodeling, solar'},
    {v:'auto',             e:'🚗', h:'Auto & Vehicle',        s:'Detailing, repair, tinting, wraps'},
    {v:'other',            e:'📦', h:'Other Service Business', s:'Any service-based business'}
  ],
  revenue:[
    {v:'under_10k',  h:'Under $10k/month',    s:'Still building. Every lead matters.'},
    {v:'10k_30k',    h:'$10k–$30k/month',     s:'Revenue is there, but it comes and goes'},
    {v:'30k_75k',    h:'$30k–$75k/month',     s:'Growing fast, but the cracks are starting to show'},
    {v:'75k_150k',   h:'$75k–$150k/month',    s:'Scaling hard, losing jobs we shouldn\'t be losing'},
    {v:'150k_plus',  h:'$150k+/month',         s:'At capacity — can\'t afford to drop a single lead'}
  ],
  bottleneck:[
    {v:'missed_calls',       e:'📵', h:'Calls go missed', s:'By the time we respond, they\'ve hired someone else'},
    {v:'leads_no_convert',   e:'🔁', h:'Leads don\'t book', s:'They come in but most never become appointments'},
    {v:'poor_followup',      e:'🕳️', h:'Inconsistent follow-up', s:'Most leads just go cold and disappear'},
    {v:'scheduling_chaos',   e:'🗓️', h:'Scheduling is a mess', s:'Everything runs through me and I can\'t keep up'},
    {v:'no_visibility',      e:'📊', h:'No visibility', s:'We\'re guessing what\'s working every month'},
    {v:'disconnected_tools', e:'🔧', h:'Tools don\'t connect', s:'Everything\'s manual and disconnected'}
  ],
  responseTime:[
    {v:'under_5min', e:'⚡', h:'Under 5 minutes',       s:'We\'re on it immediately'},
    {v:'5_30min',    e:'🕐', h:'5–30 minutes',           s:'Pretty fast, most of the time'},
    {v:'30min_2hr',  e:'🕑', h:'30 min to 2 hours',     s:'We get there, but not always quickly'},
    {v:'same_day',   e:'🕓', h:'Same day',               s:'When we have a chance to breathe'},
    {v:'next_day',   e:'📅', h:'Next day or later',      s:'We\'re too busy running jobs'},
    {v:'no_process', e:'🤷', h:'No consistent process',  s:'Depends on who sees it first'}
  ],
  tier:{
    critical:  {label:'🔴 Critical — Revenue at Risk',         headline:'Right now, you\'re working hard and losing jobs you should be closing.'},
    leaking:   {label:'🟡 Leaking — Real Revenue Slipping',    headline:'You\'re generating leads. But a big chunk disappear before they book.'},
    functional:{label:'🟢 Functional — Growth is Capped',      headline:'Your system works when you\'re watching it. The problem is when you\'re not.'},
    strong:    {label:'🚀 Strong — Time to Scale',              headline:'Your foundation is solid. The next step is building volume without chaos.'}
  },
  tierBody:{
    critical:`<ul class="text-left space-y-2 mt-4 text-on-surface-variant text-sm"><li>• Leads are arriving and leaving before anyone speaks to them</li><li>• Every slow response is a job going to whoever picks up first</li><li>• Fixing this one thing could be worth $5k–$15k/month</li></ul>`,
    leaking:`<ul class="text-left space-y-2 mt-4 text-on-surface-variant text-sm"><li>• You're getting leads, but conversion is lower than it should be</li><li>• Inconsistent follow-up is letting booked appointments slip weekly</li><li>• Those lost jobs aren't going away — they're going to whoever responds faster</li></ul>`,
    functional:`<ul class="text-left space-y-2 mt-4 text-on-surface-variant text-sm"><li>• Things work while you're manually holding them together</li><li>• Growth slows because your system depends on you being in it</li><li>• One busy week and the whole thing slips</li></ul>`,
    strong:`<ul class="text-left space-y-2 mt-4 text-on-surface-variant text-sm"><li>• The foundation is there — the question is how fast you want to grow</li><li>• The next constraint will be lead volume and conversion at scale</li><li>• A Revenue Audit maps exactly what to build next</li></ul>`
  }
};

// ── Render Helpers ───────────────────────────────────────────────────────────
function n(s){ return (s||'').replace(/</g,'&lt;'); }

function optCards(items, field, cols){
  return `<div class="grid grid-cols-1 ${cols||'md:grid-cols-2'} gap-3">` +
    items.map(it=>`
      <div class="option-card cursor-pointer rounded-2xl p-4 border border-outline-variant/20 bg-surface-container hover:border-primary/50 hover:bg-primary/5 transition-all duration-200"
           data-field="${field}" data-value="${it.v}" onclick="pickOption(this)">
        <div class="flex items-start gap-3">
          ${it.e?`<span class="text-xl mt-0.5">${it.e}</span>`:''}
          <div>
            <div class="font-label font-semibold text-white text-sm">${it.h}</div>
            <div class="text-on-surface-variant text-xs mt-0.5">${it.s}</div>
          </div>
        </div>
      </div>`).join('') + '</div>';
}

function card(content){
  return `<div class="bg-surface-container p-8 md:p-10 rounded-[2rem] border border-primary/20 shadow-2xl shadow-primary/5 relative overflow-hidden">
    <div class="absolute -top-20 -right-20 w-56 h-56 bg-primary/8 blur-[80px] rounded-full pointer-events-none"></div>
    <div class="relative z-10">${content}</div></div>`;
}

function eyebrow(t){ return `<div class="inline-flex items-center gap-2 mb-5 px-3 py-1 rounded-full bg-surface-container-high border border-outline-variant/15"><span class="flex h-1.5 w-1.5 rounded-full bg-brand-green animate-pulse"></span><span class="text-[10px] font-label uppercase tracking-widest text-brand-green">${t}</span></div>`; }
function h2(t){ return `<h2 class="font-headline text-3xl md:text-4xl font-bold text-white leading-tight mb-3">${t}</h2>`; }
function sub(t){ return `<p class="text-on-surface-variant text-base mb-6">${t}</p>`; }
function btn(id,t,extra=''){return `<button id="${id}" onclick="nextStep()" class="w-full mt-6 signature-texture text-white font-label font-bold py-4 rounded-xl text-sm uppercase tracking-widest hover:scale-[1.02] transition-transform shadow-lg shadow-primary/20 ${extra}">${t}</button>`;}

// ── Steps ────────────────────────────────────────────────────────────────────
const STEPS = [

  // 1 — Welcome
  ()=> card(`
    ${eyebrow('Free Revenue Audit — Takes 2 Minutes')}
    ${h2('Every missed call is a job that went to your competitor.')}
    ${sub('Most service businesses lose 40% of their leads before anyone picks up the phone. This free audit shows you exactly where you\'re losing customers — and what one change would stop the bleeding.')}
    ${btn('s1-cta','Find My Leaks — Free →')}
    <p class="text-center text-xs text-on-surface-variant mt-3 opacity-70">No sales pitch. No obligation. Just an honest look at your numbers.</p>`),

  // 2 — Contact
  ()=> card(`
    ${eyebrow('Step 1 of 8')}
    ${h2('What\'s your name?')}
    ${sub('Your results will be built around your answers — not a generic template.')}
    <div class="space-y-4">
      <input id="f-name" type="text" placeholder="First name" required
        class="w-full bg-surface-container-lowest border-0 border-b-2 border-outline-variant/20 px-0 py-3 text-white placeholder:text-outline focus:border-primary outline-none transition-colors"
        oninput="state.firstName=this.value;document.getElementById('s2-cta').textContent=this.value?'Let\'s go, '+this.value+' →':'Continue →'"/>
      <input id="f-email" type="email" placeholder="Email address" required
        class="w-full bg-surface-container-lowest border-0 border-b-2 border-outline-variant/20 px-0 py-3 text-white placeholder:text-outline focus:border-primary outline-none transition-colors"/>
      <input id="f-phone" type="tel" placeholder="Phone number" required
        class="w-full bg-surface-container-lowest border-0 border-b-2 border-outline-variant/20 px-0 py-3 text-white placeholder:text-outline focus:border-primary outline-none transition-colors"/>
    </div>
    ${btn('s2-cta','Continue →')}`),

  // 3 — Business Type
  ()=> card(`
    ${eyebrow('Step 2 of 8')}
    ${h2(`What kind of business do you run${state.firstName?', '+state.firstName:''}?`)}
    ${sub('We\'ll benchmark your score against businesses just like yours.')}
    ${optCards(COPY.bizTypes,'businessType')}`),

  // 4 — Business Name
  ()=> card(`
    ${eyebrow('Step 3 of 8')}
    ${h2('What\'s the name of your business?')}
    ${sub('Your results will show exactly what\'s happening at your business — not a generic industry average.')}
    <input id="f-biz" type="text" placeholder="Business name" required
      class="w-full bg-surface-container-lowest border-0 border-b-2 border-outline-variant/20 px-0 py-3 text-white placeholder:text-outline focus:border-primary outline-none transition-colors"/>
    ${btn('s4-cta','Continue →')}`),

  // 5 — Revenue
  ()=> card(`
    ${eyebrow('Step 4 of 8')}
    ${h2(`Honestly — where is ${n(state.businessName)||'your business'} right now?`)}
    ${sub('There\'s no wrong answer. This just makes your score more accurate.')}
    ${optCards(COPY.revenue,'revenueStage','')}`),

  // 6 — Bottleneck
  ()=> card(`
    ${eyebrow('Step 5 of 8')}
    ${h2(`Where is ${n(state.businessName)||'your business'} bleeding the most right now?`)}
    ${sub('Pick the one that\'s costing you real jobs — not just frustration.')}
    ${optCards(COPY.bottleneck,'bottleneck')}`),

  // 7 — Response Time
  ()=> card(`
    ${eyebrow('Step 6 of 8')}
    ${h2('When a new lead comes in — how fast does someone actually respond?')}
    ${sub('Studies show if you don\'t respond within 5 minutes, you lose 80% of those leads. Be honest.')}
    ${optCards(COPY.responseTime,'responseTime')}`),

  // 8 — Pivot (auto-advance)
  ()=>{
    const r = window.CrescaScoring.compute(state);
    state.score=r.score; state.monthlyLoss=r.monthlyLoss; state.tier=r.tier; state.bottleneckLabel=r.bottleneckLabel;
    sendDiagnosticData();
    setTimeout(()=>goTo(9), 3500);
    return card(`
      ${eyebrow('Calculating your score...')}
      ${h2(`That gap is costing ${n(state.businessName)||'your business'} real money.`)}
      <p class="text-on-surface-variant text-base mb-6">Here's the math most owners don't want to see:<br><br>
      If you're bringing in 30 leads/month and losing 40% to slow follow-up — that's 12 customers who hired your competitor.<br><br>
      At $500 average job value, that's <span class="text-error font-bold">$${state.monthlyLoss.toLocaleString()}/month walking out the door</span>.
      </p>
      <div class="flex items-center gap-3 text-brand-green text-sm font-label">
        <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24" fill="none"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4l3-3-3-3v4a8 8 0 000 16v-4l-3 3 3 3v-4a8 8 0 01-8-8z"/></svg>
        Calculating your Customer Acquisition Score...
      </div>`);
  },

  // 9 — Results
  ()=>{
    const t = COPY.tier[state.tier]||COPY.tier.leaking;
    const body = COPY.tierBody[state.tier]||COPY.tierBody.leaking;
    CrescaTrack.resultsReached(state.score, state.tier);
    return card(`
      ${eyebrow('Your Customer Acquisition Score')}
      <div class="text-center mb-6">
        <div class="text-7xl font-headline font-bold text-white">${state.score}</div>
        <div class="text-on-surface-variant text-sm">/ 100</div>
        <div class="mt-3 text-sm font-label font-bold text-brand-green">${t.label}</div>
        <p class="text-white font-semibold mt-2">${t.headline}</p>
      </div>
      <div class="bg-surface-container-high rounded-xl p-4 mb-6">
        <p class="text-xs font-label uppercase tracking-widest text-on-surface-variant mb-1">This is not a traffic problem.</p>
        <p class="text-white text-sm">It's a conversion and follow-up problem. You're losing leads you already have.</p>
        ${body}
      </div>
      <div class="bg-error/10 border border-error/20 rounded-xl p-4 mb-6 text-sm text-on-surface-variant">
        Every week this isn't fixed, more leads go unanswered.<br>
        Not because the market is slow — because the system isn't working when you're not watching.
      </div>
      <p class="text-center text-on-surface-variant text-xs mb-4">Here's what we'd fix first — in your free 30-minute Revenue Audit.</p>
      <button onclick="goTo(10);CrescaTrack.ctaClicked('calendar')" class="w-full signature-texture text-white font-label font-bold py-4 rounded-xl text-sm uppercase tracking-widest hover:scale-[1.02] transition-transform shadow-lg shadow-primary/20">
        Book My Free Revenue Audit →
      </button>
      <div class="flex justify-center gap-6 mt-4 text-xs text-on-surface-variant">
        <span>✓ Specific to your business</span><span>✓ 30 min flat</span><span>✓ No commitment</span>
      </div>`);
  },

  // 10 — Booking
  ()=>{
    const waLink = `https://wa.me/15162988323?text=Hola%20acabo%20de%20hacer%20el%20diagnostico%20y%20quiero%20ver%20como%20arreglarlo`;
    const wa = LANG==='es' ? `<div class="mt-6 text-center"><p class="text-on-surface-variant text-xs mb-2">¿Tienes preguntas antes de agendar?</p><a href="${waLink}" target="_blank" onclick="CrescaTrack.ctaClicked('whatsapp')" class="inline-flex items-center gap-2 text-brand-green font-label text-sm font-bold hover:underline">Escríbenos por WhatsApp →</a></div>` : `<div class="mt-6 text-center"><p class="text-on-surface-variant text-xs mb-2">Not ready to commit to a time yet?</p><a href="mailto:info@crescaos.com" class="text-brand-green font-label text-sm font-bold hover:underline">Send us a message instead →</a></div>`;
    return card(`
      ${eyebrow('Final Step')}
      ${h2('Pick a time. We\'ll show you exactly what to fix.')}

// ── Navigation ───────────────────────────────────────────────────────────────
let currentStep = 1;

function render(step){
  const el = document.getElementById('funnel');
  el.innerHTML = STEPS[step-1]();
  el.classList.remove('animate-fade-in');
  void el.offsetWidth;
  el.classList.add('animate-fade-in');
  updateProgress(step);
  window.scrollTo({top:0,behavior:'smooth'});
  CrescaTrack.stepCompleted(step, 'step_'+step);
}

function updateProgress(step){
  const wrap = document.getElementById('prog-wrap');
  if(step===1){wrap.classList.add('hidden');return;}
  wrap.classList.remove('hidden');
  const pct = Math.round(((step-1)/8)*100);
  document.getElementById('prog-bar').style.width = pct+'%';
  document.getElementById('prog-pct').textContent = pct+'%';
  const labels=['','Contact','Business Type','Business Name','Revenue','Bottleneck','Response Time','Calculating...','Your Score','Book Your Audit'];
  document.getElementById('prog-label').textContent = 'Step '+(step-1)+': '+(labels[step]||'');
}

function goTo(step){
  currentStep=step;
  render(step);
}

function nextStep(){
  if(currentStep===1){
    CrescaTrack.funnelStart();
    goTo(2);
    return;
  }
  if(currentStep===2){
    const name=document.getElementById('f-name').value.trim();
    const email=document.getElementById('f-email').value.trim();
    const phone=document.getElementById('f-phone').value.trim();
    if(!name||!email||!phone){alert('Please fill in all fields.');return;}
    state.firstName=name; state.email=email; state.phone=phone;
    goTo(3); return;
  }
  if(currentStep===4){
    const biz=document.getElementById('f-biz').value.trim();
    if(!biz){alert('Please enter your business name.');return;}
    state.businessName=biz;
    goTo(5); return;
  }
}

function pickOption(el){
  const field=el.dataset.field, value=el.dataset.value;
  document.querySelectorAll(`[data-field="${field}"]`).forEach(c=>{
    c.classList.remove('border-primary','bg-primary/10');
    c.classList.add('border-outline-variant/20','bg-surface-container');
  });
  el.classList.add('border-primary','bg-primary/10');
  el.classList.remove('border-outline-variant/20','bg-surface-container');
  state[field]=value;
  const nextMap={businessType:4,revenueStage:6,bottleneck:7,responseTime:8};
  const next=nextMap[field];
  if(next) setTimeout(()=>goTo(next), 320);
}

// ── GHL Data Send ────────────────────────────────────────────────────────────
let _sent=false;
function sendDiagnosticData(){
  if(_sent) return; _sent=true;
  const payload={
    source:'Diagnostic Funnel',
    name: state.firstName,
    email: state.email,
    phone: state.phone,
    businessName: state.businessName,
    businessType: state.businessType,
    revenue: state.revenueStage,
    stage: state.bottleneck,
    bottleneck: state.bottleneck,
    responseTime: state.responseTime,
    score: state.score,
    score_tier: state.tier,
    monthlyLoss: state.monthlyLoss,
    language: LANG,
    utm_source: state.utm_source,
    utm_medium: state.utm_medium,
    utm_campaign: state.utm_campaign,
    utm_content: state.utm_content,
    utm_term: state.utm_term,
    source_page: state.source_page,
    referrer: state.referrer,
    landing_page: state.landing_page
  };
  fetch(WEBHOOK_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})

    .catch(()=>{});
}

    <script>
        // Neural Network Particle Background
        window.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('neural-bg');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let particles = [];
            const particleCount = 80;
            const maxDistance = 160;

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() {
                    this.init();
                }
                init() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.vx = (Math.random() - 0.5) * 0.3;
                    this.vy = (Math.random() - 0.5) * 0.3;
                    this.radius = Math.random() * 1.5;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                    if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = '#0A84FF20';
                    ctx.fill();
                }
            }

            for (let i = 0; i < particleCount; i++) particles.push(new Particle());

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < particles.length; i++) {
                    particles[i].update();
                    particles[i].draw();
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        if (distance < maxDistance) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(10, 132, 255, ${0.1 * (1 - distance/maxDistance)})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(animate);
            }
            animate();
        });


    </script>
