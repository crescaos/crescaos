<body class="bg-background text-white font-body flex items-center justify-center min-h-screen overflow-hidden">
    <canvas id="neural-bg" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; opacity:0.8; pointer-events:none;"></canvas>
    
    <div class="relative z-10 max-w-2xl w-full px-6 text-center">
        <div class="mb-8 inline-flex items-center justify-center w-20 h-20 rounded-full bg-brand-green/20 border border-brand-green/30 animate-bounce">
            <svg class="w-10 h-10 text-brand-green" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"></path>
            </svg>
        </div>
        
        <h1 class="font-headline text-5xl md:text-6xl font-bold mb-6 tracking-tight">Success!</h1>
        <p class="text-xl md:text-2xl text-slate-400 mb-10 leading-relaxed">
            Thank you for requesting a systems audit. Our team will review your information and reach out within 24 hours to confirm your scheduled time.
        </p>
        
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="index.html" class="bg-primary text-white font-label font-bold py-4 px-8 rounded-xl transition-transform hover:scale-105 uppercase tracking-widest text-sm">
                Return Home
            </a>
            <a href="solutions.html" class="bg-white/5 border border-white/10 text-white font-label font-bold py-4 px-8 rounded-xl transition-transform hover:scale-105 uppercase tracking-widest text-sm backdrop-blur-sm">
                Explore Solutions
            </a>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('neural-bg');
            const ctx = canvas.getContext('2d');
            let particles = [];
            const particleCount = 60;
            const maxDistance = 180;

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.vx = (Math.random() - 0.5) * 0.4;
                    this.vy = (Math.random() - 0.5) * 0.4;
                    this.radius = Math.random() * 2 + 0.5;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                    if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(0, 230, 138, 0.7)';
                    ctx.fill();
                }
            }

            for (let i = 0; i < particleCount; i++) particles.push(new Particle());

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < particles.length; i++) {
                    particles[i].update();
                    particles[i].draw();
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        if (distance < maxDistance) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(10, 132, 255, ${0.3 * (1 - distance / maxDistance)})`;
                            ctx.lineWidth = 0.8;
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(animate);
            }
            animate();
        });
    </script>
</body>
