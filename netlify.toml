[build]
  command = "echo 'Static site - no build required'"
  publish = "public"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"


[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true


[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
