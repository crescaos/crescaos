[build]
  command = "echo 'Static site - no build required'"
  publish = "public"

[[redirects]]
  from = "/api/*"
  to = "https://openclaw-production-977e.up.railway.app/api/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
